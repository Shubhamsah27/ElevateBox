services:
  # SvelteKit Web Service
  - type: web
    name: elevatebox-cdas
    plan: free
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx drizzle-kit push --force && npx tsx src/lib/server/db/seed.ts && node build
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elevatebox-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  # PostgreSQL Database Instance
  - name: elevatebox-db
    databaseName: document_approval
    plan: free
